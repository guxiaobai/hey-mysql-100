---
- hosts: all
  vars:
    key: /usr/share/keyrings/mysql-apt-config.gpg
    repo: http://repo.mysql.com/apt/ubuntu/
    version: mysql-8.4-lts

  handlers:
    - name: restart mysql
      service: name=mysql.service state=restarted

  tasks:
  - name: Add MySQL Key
    ansible.builtin.apt_key:
    #   keyserver: pgp.mit.edu
    #   id: A8D3785C
      url: https://repo.mysql.com/RPM-GPG-KEY-mysql-2025
      keyring: "{{ key }}"
      state: present

  - name: Add MySQL Repo
    apt_repository:
      repo: "{{ item }}"
      state: present
      filename: mysql
    with_items:
      - deb [signed-by={{ key }}] {{ repo }} {{ ansible_facts["distribution_release"] }} {{ version }}
      - deb [signed-by={{ key }}] {{ repo }} {{ ansible_facts["distribution_release"] }} mysql-tools

  - name: install mysql
    apt:
      name: "{{ item }}"
      state: present
    with_items:
      - mysql-server

  # - name: allow remote connect 
  #   replace:
  #     path: /etc/mysql/mysql.conf.d/mysqld.cnf
  #     regexp: '^bind-address'
  #     replace: '# bind-address'
  #   notify: restart mysql